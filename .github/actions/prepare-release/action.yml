name: Prepare Release
description: Copy Samples to package

runs:
  using: composite
  steps:
    - name: Copy Samples to package
      shell: bash
      run: |
        mkdir -p Packages/com.ec-k.violet-solver/Samples~
        # Copy only script files (without .meta and asmdef)
        rsync -av --exclude='*.meta' --exclude='*.asmdef' Assets/Development/Samples/Scripts/ Packages/com.ec-k.violet-solver/Samples~/

    - name: Verify no .meta files copied
      shell: bash
      run: |
        echo "=== Checking for .meta files in Samples~ ==="
        META_COUNT=$(find Packages/com.ec-k.violet-solver/Samples~ -name "*.meta" | wc -l)
        if [ "$META_COUNT" -gt 0 ]; then
          echo "ERROR: Found $META_COUNT .meta files!"
          find Packages/com.ec-k.violet-solver/Samples~ -name "*.meta"
          exit 1
        fi
        echo "OK: No .meta files found"
        echo ""
        echo "=== Files in Samples~ ==="
        find Packages/com.ec-k.violet-solver/Samples~ -type f | head -50
